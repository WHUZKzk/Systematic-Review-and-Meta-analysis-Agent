# ============================================================
# Skill: screening.screening_decision_logic  (A2.8)
# ============================================================

skill_id: "screening.screening_decision_logic"
version: "1.0.0"
domain: "screening"
skill_type: "methodological"
evidence_base: "Cochrane Handbook v6.4, Ch.4.6.1 (Selecting studies)"
description: >
  Core screening decision logic for ReviewerAgent (dual independent review).
  Supports two modes: title_screening (liberal pass) and abstract_screening (all criteria).
  For each paper, produce a structured YES/NO/UNCERTAIN judgment per criterion plus an
  aggregate include/exclude/uncertain decision. Two ReviewerAgents load this same Skill
  but use different LLM backends to ensure heterogeneity.

trigger:
  stage: "screening"
  step: "screening_step_2a_title"
  disclosure_level: "L2_active"

required_context:
  - context_key: "eligibility_criteria"
    source: "stage_output"
    description: "Confirmed eligibility criteria (binary questions + definitions) from step 1"
  - context_key: "screening_mode"
    source: "stage_output"
    description: "Either 'title' or 'abstract' — controls which criteria to apply"
  - context_key: "papers_batch"
    source: "stage_output"
    description: "Batch of papers to screen: [{pmid, title, abstract (if abstract mode)}]"

decision_protocol:
  type: decision_tree
  token_budget: 800
  content:
    entry_point: "select_screening_mode"
    nodes:
      - node_id: "select_screening_mode"
        condition: "What is the screening_mode?"
        branches:
          - match: "title"
            action: "go_to: title_screening_protocol"
          - match: "abstract"
            action: "go_to: abstract_screening_protocol"

      - node_id: "title_screening_protocol"
        description: "Liberal pass — only exclude papers that are obviously irrelevant"
        rules:
          - "Review only the paper title (ignore abstract even if available)"
          - "Ask: Does the title mention any concept remotely related to the intervention, population, or outcome?"
          - "EXCLUDE only if the title clearly indicates: wrong population, wrong topic area, or definitively non-primary research (e.g., 'systematic review', 'meta-analysis', 'editorial', 'guideline', 'protocol')"
          - "When in doubt at title stage: answer UNCERTAIN (pass to abstract screening)"
          - "Do NOT apply detailed inclusion criteria at this stage — that is for abstract screening"
        criteria_to_check: ["study_design"]
        action: "go_to: format_decision"

      - node_id: "abstract_screening_protocol"
        description: "Full criteria assessment using title + abstract"
        rules:
          - "Review title AND abstract together"
          - "Assess each binary_question from the eligibility_criteria"
          - "For each criterion: answer YES (meets criterion), NO (fails criterion), or UNCERTAIN (cannot determine from abstract)"
          - "If ANY criterion is answered NO: overall decision is EXCLUDE"
          - "If ALL criteria are answered YES: overall decision is INCLUDE"
          - "If no criterion is NO but one or more are UNCERTAIN: overall decision is UNCERTAIN"
          - "For UNCERTAIN: specify exactly which criterion is unclear and what information from the full text would resolve it"
          - "For EXCLUDE: specify which criterion(ia) were violated"
        criteria_to_check: "all"
        action: "go_to: format_decision"

      - node_id: "format_decision"
        description: "Produce structured output for the paper batch"
        output_format: "See output_schema below"
        aggregation_rules:
          - "title mode: any NO → EXCLUDE; otherwise UNCERTAIN (liberal pass)"
          - "abstract mode: any NO → EXCLUDE; all YES → INCLUDE; remaining UNCERTAIN → UNCERTAIN"

output_schema:
  format: json
  schema:
    type: object
    required: ["decisions"]
    properties:
      decisions:
        type: array
        items:
          type: object
          required: ["pmid", "decision", "reasoning"]
          properties:
            pmid:
              type: string
            decision:
              type: string
              enum: ["INCLUDE", "EXCLUDE", "UNCERTAIN"]
            criteria_assessment:
              type: array
              description: "Per-criterion assessment (required for abstract mode)"
              items:
                type: object
                required: ["criterion_id", "answer", "evidence"]
                properties:
                  criterion_id: {type: string}
                  answer: {type: string, enum: ["YES", "NO", "UNCERTAIN"]}
                  evidence: {type: string, description: "Direct quote or paraphrase from title/abstract supporting this answer"}
            reasoning:
              type: string
              description: "Brief explanation of the overall decision (1-3 sentences)"
            exclude_reason:
              type: string
              description: "If EXCLUDE: the primary criterion that was violated"
            uncertain_questions:
              type: array
              description: "If UNCERTAIN: specific questions that full text would resolve"
              items: {type: string}
  example:
    decisions:
      - pmid: "12345678"
        decision: "INCLUDE"
        criteria_assessment:
          - criterion_id: "population"
            answer: "YES"
            evidence: "Participants were adults aged 60-75 years"
          - criterion_id: "intervention"
            answer: "YES"
            evidence: "The study used a smartphone app for health behavior tracking"
          - criterion_id: "outcome"
            answer: "YES"
            evidence: "Sedentary time was measured via accelerometer"
          - criterion_id: "study_design"
            answer: "YES"
            evidence: "Randomized controlled trial design"
        reasoning: "All inclusion criteria are clearly met based on the abstract."
      - pmid: "87654321"
        decision: "EXCLUDE"
        criteria_assessment:
          - criterion_id: "study_design"
            answer: "NO"
            evidence: "This is a systematic review of smartphone interventions"
        reasoning: "Study is a systematic review, not a primary RCT."
        exclude_reason: "Wrong study design: systematic review, not primary RCT"
      - pmid: "11111111"
        decision: "UNCERTAIN"
        criteria_assessment:
          - criterion_id: "outcome"
            answer: "UNCERTAIN"
            evidence: "Physical activity outcomes were reported but sedentary time is not explicitly mentioned"
        reasoning: "Cannot confirm sedentary time measurement from the abstract alone."
        uncertain_questions:
          - "Does the study measure sedentary time or sitting time specifically?"

validation:
  - rule_id: "all_papers_have_decisions"
    description: "Every paper in the batch must have a decision"
    expression: "isinstance(output, dict) and len(output.get('decisions', [])) > 0"
    severity: hard
    on_fail: retry

  - rule_id: "valid_decision_values"
    description: "All decisions must be INCLUDE, EXCLUDE, or UNCERTAIN"
    expression: |
      (isinstance(output, dict) and
      all(d.get('decision') in ['INCLUDE', 'EXCLUDE', 'UNCERTAIN']
          for d in output.get('decisions', [])))
    severity: hard
    on_fail: retry

  - rule_id: "decisions_have_reasoning"
    description: "Every decision must have a non-empty reasoning"
    expression: |
      (isinstance(output, dict) and
      all(len(d.get('reasoning', '').strip()) > 5
          for d in output.get('decisions', [])))
    severity: hard
    on_fail: retry

  - rule_id: "exclude_has_reason"
    description: "EXCLUDE decisions must have exclude_reason or evidence in criteria_assessment"
    expression: |
      (isinstance(output, dict) and
      all(
        d.get('exclude_reason') or
        any(c.get('answer') == 'NO' for c in d.get('criteria_assessment', []))
        for d in output.get('decisions', [])
        if d.get('decision') == 'EXCLUDE'
      ))
    severity: hard
    on_fail: retry

manifest:
  purpose: "Guide ReviewerAgent to make YES/NO/UNCERTAIN decisions per criterion, then aggregate to INCLUDE/EXCLUDE/UNCERTAIN per paper"
  key_constraints:
    - "Title mode: liberal — only exclude obviously irrelevant papers; default to UNCERTAIN"
    - "Abstract mode: strict — apply ALL criteria; any NO → EXCLUDE"
    - "Every decision must have a reasoning string"
    - "EXCLUDE must identify the violated criterion; UNCERTAIN must list what full text would resolve"
    - "Reviewer must NOT know the other reviewer's decisions (enforced at pipeline level)"
  output_type: "JSON with decisions array: [{pmid, decision, criteria_assessment, reasoning, ...}]"
